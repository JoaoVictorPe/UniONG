<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniONG - Conectando você a causas que importam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Offline/Reconnecting Overlay -->
    <div id="offline-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.95); z-index: 9999; color: var(--primary); justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px;">
        <h2 style="margin-bottom: 15px;">⏳ Buscando servidor...</h2>
        <div class="spinner" style="border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>

    <header class="navbar">
        <div class="container">
            <h1 class="logo">Uni<span>ONG</span></h1>
            <nav>
                <a href="./index.html">Home</a>
                <a href="./index.html#campaigns">Campanhas</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>Faça a diferença hoje.</h2>
                <p>O apoio financeiro transforma vidas. Encontre causas sociais reais e contribua (nesta simulação) para um mundo melhor.</p>
                <a href="#campaigns" class="btn btn-primary">Ver Campanhas</a>
            </div>
        </section>

        <section id="campaigns" class="campaigns-section">
            <div class="container">
                <h3 class="section-title">Campanhas em Destaque</h3>
                <div class="grid" id="campaign-grid">
                    <!-- Cards via JS -->
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div class="container text-center">
            <p>Projeto de Portfólio 2026 - UniONG - As doações aqui são fictícias.</p>
        </div>
    </footer>

    <script src="./js/api.js" defer></script>
    <script src="./js/main.js" defer></script>
</body>
</html>
